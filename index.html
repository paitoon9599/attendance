<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบันทึกเวลาทำงานด้วย GPS</title>
    <style>
        * { box-sizing: border-box; font-family: 'Sarabun', sans-serif; }
        body { background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: white; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        h2 { color: #1a365d; margin-bottom: 5px; }
        p.subtitle { color: #718096; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: bold; font-size: 14px; }
        select { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 16px; background-color: white; }
        #camera-container { width: 100%; height: 260px; background-color: #2d3748; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; display: none; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #captured-image { display: none; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .btn { background-color: #3182ce; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-bottom: 10px; display: none; }
        .btn:hover { background-color: #2b6cb0; }
        .btn-secondary { background-color: #edf2f7; color: #4a5568; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; padding: 10px; border-radius: 6px; display: none; }
        .success { background-color: #c6f6d5; color: #22543d; display: block !important; }
        .error { background-color: #fed7d7; color: #742a2a; display: block !important; }
        .loading { background-color: #feebc8; color: #744210; display: block !important; }
        .location-badge { font-size: 14px; font-weight: bold; padding: 12px; border-radius: 8px; background: #feebc8; color: #744210; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>บันทึกเวลาทำงาน</h2>
    <p class="subtitle">ระบบเช็กอินพิกัดตำแหน่งพื้นที่บริษัท</p>
    
    <div id="location-info" class="location-badge">⏳ กำลังตรวจสอบตำแหน่งพิกัด GPS ของคุณ...</div>

    <div id="main-area" style="display: none;">
        <div class="form-group">
            <label for="empSelect">เลือกชื่อ-นามสกุลของคุณ</label>
            <select id="empSelect">
                <option value="">-- กรุณาเลือกชื่อ --</option>
            </select>
        </div>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <img id="captured-image" alt="Captured">
        </div>

        <button type="button" class="btn" id="capture-btn" onclick="capturePhoto()" style="display: block;">📸 ถ่ายรูปใบหน้า</button>
        <button type="button" class="btn btn-secondary" id="retake-btn" onclick="retakePhoto()" style="display:none;">🔄 ถ่ายใหม่</button>
        <button type="button" class="btn" id="submit-btn" onclick="submitAttendance()" style="background-color: #48bb78; margin-top:10px;">📤 ส่งเวลาเข้างาน</button>
    </div>

    <div id="status"></div>
</div>

<script>
    // ⚠️ วางลิงก์คำสั่ง /exec ของพี่ที่ก๊อปปี้มาจาก Google Apps Script ตรงนี้ครับ
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxyCwvvkH_7oTL08MCuihUOgOdziS93WPLtBXLC59D_x8sCM3TT5DZEq96QmWiyNKg8/exec"; 

    let base64Photo = "";
    let userLocation = { lat: null, lng: null };
    let activeStream = null;
    
    const video = document.getElementById('video');
    const capturedImage = document.getElementById('captured-image');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const submitBtn = document.getElementById('submit-btn');
    const statusDiv = document.getElementById('status');
    const locationInfo = document.getElementById('location-info');
    const empSelect = document.getElementById('empSelect');

    window.onload = function() {
        getLocation();
    };

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLocation.lat = position.coords.latitude;
                userLocation.lng = position.coords.longitude;
                loadEmployeeDropdown();
            }, function(error) {
                locationInfo.innerHTML = "❌ เข้าถึงพิกัดไม่ได้! กรุณาเปิดสิทธิ์พิกัดบนมือถือ";
                locationInfo.style.backgroundColor = "#fed7d7";
                locationInfo.style.color = "#742a2a";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    }

    function loadEmployeeDropdown() {
        fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "get_employees" })
        })
        .then(res => res.json())
        .then(employees => {
            if (!employees || employees.length === 0) {
                locationInfo.innerHTML = "❌ ไม่พบรายชื่อพนักงานในฐานข้อมูล";
                return;
            }
            
            employees.forEach(name => {
                let opt = document.createElement('option');
                opt.value = name;
                opt.innerHTML = name;
                empSelect.appendChild(opt);
            });

            locationInfo.innerHTML = "✅ คุณอยู่ในพื้นที่บริษัท (พร้อมลงเวลา)";
            locationInfo.style.backgroundColor = "#c6f6d5";
            locationInfo.style.color = "#22543d";
            
            document.getElementById('main-area').style.display = 'block';
            document.getElementById('camera-container').style.display = 'block';
            
            initCamera();
        })
        .catch(err => {
            locationInfo.innerHTML = "❌ ไม่สามารถเชื่อมต่อหลังบ้านได้: " + err;
        });
    }

    function initCamera() {
        const constraints = { video: { facingMode: "user" }, audio: false };
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            activeStream = stream;
            video.srcObject = stream;
            video.setAttribute('playsinline', true);
            video.setAttribute('autoplay', true);
        })
        .catch(function(err) {
            showStatus("⚠️ ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบสิทธิ์กล้องของเบราว์เซอร์", "error");
        });
    }

    function capturePhoto() {
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        base64Photo = canvas.toDataURL('image/jpeg', 0.6);
        capturedImage.src = base64Photo;
        
        video.style.display = 'none';
        capturedImage.style.display = 'block';
        captureBtn.style.display = 'none';
        retakeBtn.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    function retakePhoto() {
        video.style.display = 'block';
        capturedImage.style.display = 'none';
        captureBtn.style.display = 'block';
        retakeBtn.style.display = 'none';
        submitBtn.style.display = 'none';
        base64Photo = "";
    }

    function submitAttendance() {
        const selectedName = empSelect.value;
        if (!selectedName) return showStatus("❌ กรุณาเลือกชื่อของคุณก่อนส่งเวลา", "error");
        if (!base64Photo) return showStatus("❌ กรุณาถ่ายรูปใบหน้าก่อนครับ", "error");

        showStatus("⏳ กำลังบันทึกเวลา...", "loading");
        submitBtn.disabled = true;

        let payload = {
            action: "submit_attendance",
            name: selectedName,
            lat: userLocation.lat,
            lng: userLocation.lng,
            photo: base64Photo.split(',')[1]
        };

        fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(response => {
            submitBtn.disabled = false;
            if(response.status === "success") {
                showStatus(response.message, "success");
                empSelect.value = "";
                setTimeout(retakePhoto, 2500);
            } else {
                showStatus(response.message, "error");
            }
        })
        .catch(err => {
            submitBtn.disabled = false;
            showStatus("ข้อผิดพลาดระบบ: " + err, "error");
        });
    }

    function showStatus(text, type) {
        statusDiv.innerHTML = text;
        statusDiv.className = type;
    }
</script>
</body>
</html>
