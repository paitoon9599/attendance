<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบบันทึกเวลาทำงานด้วย GPS (Premium Version)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(145deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-glass: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.12);
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-orange: #f97316;
            --text-pure: #ffffff;
            --text-muted: #94a3b8;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: 'Sarabun', 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--bg-gradient);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            color: var(--text-pure);
            overflow-x: hidden;
        }

        /* กล่องหลักสไตล์กระจกโปร่งแสงสุดล้ำ */
        .app-card { 
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 28px 32px 28px; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.2); 
            width: 100%; 
            max-width: 420px; 
            text-align: center;
            border: 1px solid var(--card-border);
            position: relative;
        }

        /* ส่วนหัวนาฬิกาเรียลไทม์ */
        .live-clock {
            font-size: 32px;
            font-weight: 700;
            color: var(--neon-blue);
            font-family: 'Inter', sans-serif;
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        h2 { 
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        p.subtitle { 
            color: var(--text-muted); 
            font-size: 13px; 
            margin-bottom: 24px; 
        }

        /* แถบพิกัด GPS แบบเรืองแสงอ่อน ๆ */
        .location-badge { 
            font-size: 13px; 
            font-weight: 500; 
            padding: 12px 16px; 
            border-radius: 16px; 
            background: rgba(245, 158, 11, 0.1); 
            color: #fbbf24; 
            margin-bottom: 24px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            transition: all 0.3s ease;
        }

        .form-group { 
            margin-bottom: 24px; 
            text-align: left; 
        }

        label { 
            display: block; 
            margin-bottom: 10px; 
            color: var(--text-muted); 
            font-weight: 500; 
            font-size: 13px; 
        }

        input[type="text"] { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid var(--card-border); 
            border-radius: 16px; 
            font-size: 16px; 
            outline: none;
            transition: all 0.25s;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-pure);
            text-align: center;
        }
        
        input[type="text"]:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.25);
            background: rgba(15, 23, 42, 0.8);
        }

        /* กรอบเลนส์กล้อง Cyberpunk มีเส้นกรอบเล็งใบหน้า */
        #camera-container { 
            width: 100%; 
            height: 280px; 
            background-color: #020617; 
            border-radius: 24px; 
            overflow: hidden; 
            margin-bottom: 24px; 
            position: relative; 
            display: none; 
            border: 2px solid var(--card-border);
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        /* หน้ากากกรอบสำหรับเล็งใบหน้าให้พนักงานตรงกลาง */
        #camera-container::after {
            content: '';
            position: absolute;
            top: 10%; left: 15%; right: 15%; bottom: 10%;
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 0 999px rgba(2, 6, 23, 0.3);
        }

        video, canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #captured-image { 
            display: none; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
            position: relative;
            z-index: 2;
        }

        /* ปุ่มกดสไตล์ Fintech เรียบ หรู มีมิติ */
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--neon-blue);
            color: #0f172a; 
            border: none; 
            padding: 16px 20px; 
            width: 100%; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            margin-bottom: 12px; 
        }

        .btn:hover { 
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }
        
        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #334155 !important;
            color: #64748b !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
            filter: none;
        }

        .btn-orange { 
            background: linear-gradient(90deg, #f97316 0%, #ea580c 100%);
            color: var(--text-pure);
        }
        .btn-orange:hover { 
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
        }

        .btn-secondary { 
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-pure);
            border: 1px solid var(--card-border);
        }
        .btn-secondary:hover { 
            background: rgba(255, 255, 255, 0.15);
        }

        /* กล่องแสดงผลสถานะแจ้งเตือน */
        #status { 
            margin-top: 16px; 
            font-size: 14px; 
            font-weight: 500; 
            padding: 14px 16px; 
            border-radius: 16px; 
            display: none; 
            text-align: center;
            line-height: 1.5;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .success { background: rgba(16, 185, 129, 0.15); color: #34d399; display: block !important; border: 1px solid rgba(52, 211, 153, 0.2); text-shadow: 0 0 10px rgba(52,211,153,0.2); }
        .error { background: rgba(239, 68, 68, 0.15); color: #f87171; display: block !important; border: 1px solid rgba(248, 113, 113, 0.2); }
        .loading { background: rgba(56, 189, 248, 0.15); color: #38bdf8; display: block !important; border: 1px solid rgba(56, 189, 248, 0.2); }

        /* แถบต้อนรับพนักงาน */
        .welcome-back { 
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-pure); 
            padding: 14px 16px; 
            border-radius: 16px; 
            font-weight: 500; 
            margin-bottom: 24px; 
            font-size: 14px; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-right: 4px solid var(--neon-blue);
            border-left: 4px solid var(--neon-blue);
        }

        #clear-btn { 
            margin-top: 20px; 
            font-size: 12px; 
            padding: 8px; 
            background: none; 
            color: #64748b; 
            border: none;
            cursor: pointer;
            transition: color 0.2s;
            letter-spacing: 0.3px;
        }
        #clear-btn:hover {
            color: #ef4444;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 480px) {
            .app-card { padding: 48px 36px 36px 36px; border-radius: 40px; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="live-clock" id="clock-display">00:00:00</div>
    <h2>บันทึกเวลาปฏิบัติราชการ</h2>
    <p class="subtitle">โรงเรียนบ้านหนองประดู่ สพป.ลพบุรี เขต 2</p>
    
    <div id="location-info" class="location-badge">⏳ กำลังสแกนชั้นบรรยากาศค้นหาพิกัด GPS...</div>

    <div id="register-area" style="display: none;">
        <div class="form-group">
            <label for="empNameInput">ระบบตรวจพบอุปกรณ์ใหม่: กรุณากรอกชื่อ-นามสกุลจริง</label>
            <input type="text" id="empNameInput" placeholder="ระบุ ชื่อ - นามสกุล">
        </div>
        <button type="button" class="btn btn-orange" onclick="registerDevice()">📲 ลงทะเบียนผูกรหัสเครื่องนี้</button>
    </div>

    <div id="main-area" style="display: none;">
        <div id="welcome-msg" class="welcome-back"></div>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <img id="captured-image" alt="Captured">
        </div>

        <button type="button" class="btn" id="capture-btn" onclick="capturePhoto()">📸 สแกนใบหน้าจับเวลา</button>
        <button type="button" class="btn btn-secondary" id="retake-btn" onclick="retakePhoto()" style="display:none;">🔄 รีเซ็ตหน้ากล้อง</button>
        <button type="button" class="btn" id="submit-btn" onclick="submitAttendance()" style="background: var(--neon-green); color: #064e3b; margin-top:14px; display: none; box-shadow: 0 10px 20px rgba(74, 222, 128, 0.25);">📤 ยืนยันการส่งเวลาลงฐานข้อมูล</button>
        
        <button type="button" id="clear-btn" onclick="clearDevice()">ยกเลิกการลงทะเบียนเครื่องนี้</button>
    </div>

    <div id="status"></div>
</div>

<script>
    // ⚠️ คงลิงก์ระบบเดิมของพี่ไว้
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxyCwvvkH_7oTL08MCuihUOgOdziS93WPLtBXLC59D_x8sCM3TT5DZEq96QmWiyNKg8/exec"; 

    let base64Photo = "";
    let userLocation = { lat: null, lng: null };
    let activeStream = null;
    let savedName = "";
    
    const video = document.getElementById('video');
    const capturedImage = document.getElementById('captured-image');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const submitBtn = document.getElementById('submit-btn');
    const statusDiv = document.getElementById('status');
    const locationInfo = document.getElementById('location-info');

    // ฟังก์ชันรันนาฬิกาให้วิ่งเรียลไทม์ล้ำ ๆ
    function startLiveClock() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
        }, 1000);
    }

    window.onload = function() {
        startLiveClock();
        checkDeviceLock();
    };

    function checkDeviceLock() {
        savedName = localStorage.getItem('employee_name');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLocation.lat = position.coords.latitude;
                userLocation.lng = position.coords.longitude;
                
                locationInfo.innerHTML = "📡 เชื่อมต่อสัญญาณดาวเทียม GPS สำเร็จ";
                locationInfo.style.backgroundColor = "rgba(16, 185, 129, 0.1)";
                locationInfo.style.color = "#34d399";
                locationInfo.style.borderColor = "rgba(52, 211, 153, 0.3)";

                if (!savedName) {
                    document.getElementById('register-area').style.display = 'block';
                    document.getElementById('main-area').style.display = 'none';
                } else {
                    document.getElementById('register-area').style.display = 'none';
                    document.getElementById('main-area').style.display = 'block';
                    document.getElementById('welcome-msg').innerHTML = "🔒 อุปกรณ์ผ่านการยืนยันตัวตน: " + savedName;
                    document.getElementById('camera-container').style.display = 'block';
                    initCamera();
                }
            }, function(error) {
                locationInfo.innerHTML = "🚨 สัญญาณล้มเหลว! โปรดเปิด Location ในมือถือ";
                locationInfo.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
                locationInfo.style.color = "#f87171";
                locationInfo.style.borderColor = "rgba(248, 113, 113, 0.3)";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    }

    function registerDevice() {
        const nameInput = document.getElementById('empNameInput').value.trim();
        if (!nameInput) return alert("กรุณาระบุชื่อ-นามสกุลผู้ใช้งานระบบก่อนครับ");
        
        localStorage.setItem('employee_name', nameInput);
        savedName = nameInput;
        
        document.getElementById('register-area').style.display = 'none';
        document.getElementById('main-area').style.display = 'block';
        document.getElementById('welcome-msg').innerHTML = "🔒 อุปกรณ์ผ่านการยืนยันตัวตน: " + savedName;
        document.getElementById('camera-container').style.display = 'block';
        initCamera();
    }

    function initCamera() {
        const constraints = { video: { facingMode: "user" }, audio: false };
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            activeStream = stream;
            video.srcObject = stream;
        })
        .catch(function(err) {
            showStatus("⚠️ ระบบไม่สามารถเข้าถึงกล้องหน้าได้ โปรดอนุญาตสิทธิ์กล้อง", "error");
        });
    }

    function capturePhoto() {
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        base64Photo = canvas.toDataURL('image/jpeg', 0.6);
        capturedImage.src = base64Photo;
        
        video.style.display = 'none';
        capturedImage.style.display = 'block';
        captureBtn.style.display = 'none';
        retakeBtn.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    function retakePhoto() {
        video.style.display = 'block';
        capturedImage.style.display = 'none';
        captureBtn.style.display = 'block';
        retakeBtn.style.display = 'none';
        submitBtn.style.display = 'none';
        base64Photo = "";
    }

    function submitAttendance() {
        if (!savedName) return showStatus("❌ ไม่พบบัญชีผู้ผูกเครื่อง", "error");
        if (!base64Photo) return showStatus("❌ กรุณาสแกนถ่ายภาพใบหน้าก่อนครับ", "error");

        showStatus("⚡ กำลังส่งข้อมูลผ่านระบบคลาวด์...", "loading");
        submitBtn.disabled = true;

        let payload = {
            action: "submit_attendance",
            name: savedName,
            lat: userLocation.lat,
            lng: userLocation.lng,
            photo: base64Photo.split(',')[1]
        };

        fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(response => {
            submitBtn.disabled = false;
            if(response.status === "success") {
                showStatus(response.message, "success");
                setTimeout(retakePhoto, 2500);
            } else {
                showStatus(response.message, "error");
            }
        })
        .catch(err => {
            submitBtn.disabled = false;
            showStatus("เครือข่ายขัดข้อง: " + err, "error");
        });
    }

    function clearDevice() {
        if(confirm("คุณต้องการยกเลิกการผูกชื่อกับอุปกรณ์เครื่องนี้หรือไม่?")) {
            localStorage.removeItem('employee_name');
            location.reload();
        }
    }

    function showStatus(text, type) {
        statusDiv.innerHTML = text;
        statusDiv.className = type;
    }
</script>
</body>
</html>
