<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS ATTENDANCE SYSTEM (COMPACT CYBERPUNK)</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;600&family=Orbitron:wght@700;900&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-bg: linear-gradient(180deg, #020617 0%, #0b1329 100%);
            --neon-cyan: #00f0ff;
            --neon-green: #39ff14;
            --neon-orange: #ff5e00;
            --neon-red: #ff0055;
            --dark-surface: rgba(15, 23, 42, 0.85);
            --border-glow: rgba(0, 240, 255, 0.25);
            --font-heavy: 'Orbitron', 'Mitr', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: var(--cyber-bg);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px;
            color: #ffffff;
            overflow: hidden;
        }

        /* ปรับสัดส่วนกล่องหลักให้กระชับ ไม่ยาวล้นจอ */
        .app-card { 
            background: var(--dark-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px 20px 20px 20px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.15); 
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            border: 2px solid var(--border-glow);
            position: relative;
            clip-path: polygon(0 0, 94% 0, 100% 6%, 100% 100%, 6% 100%, 0 94%);
        }

        /* นาฬิกาขนาดย่อมลงมานิดนึงเพื่อให้เหลือพื้นที่ด้านล่าง */
        .live-clock {
            font-family: 'Orbitron', sans-serif;
            font-size: 34px;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 1px;
            margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        h2 { 
            font-family: var(--font-heavy);
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }

        p.subtitle { 
            color: #64748b; 
            font-size: 12px; 
            margin-bottom: 15px;
            font-weight: 700;
        }

        /* 📡 เรดาร์สัญญาณพิกัด GPS แบบ Compact */
        .radar-panel {
            background: rgba(2, 6, 23, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.15);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            font-weight: bold;
            color: var(--neon-cyan);
        }

        .radar-signal {
            width: 10px;
            height: 10px;
            background-color: var(--neon-orange);
            border-radius: 50%;
            position: relative;
        }
        .radar-signal::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background-color: inherit;
            border-radius: 50%;
            animation: pulse-ring 1.5s infinite;
        }

        .form-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }

        label { 
            font-family: var(--font-heavy);
            display: block; 
            margin-bottom: 6px; 
            color: #94a3b8; 
            font-size: 11px; 
        }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #334155; 
            border-radius: 10px; 
            font-size: 15px; 
            outline: none;
            background: #020617;
            color: #ffffff;
            font-weight: bold;
            text-align: center;
        }

        /* ย่อความสูงกล้องลงมาเพื่อคืนพื้นที่ให้กล่องแจ้งเตือนด้านล่าง */
        #camera-container { 
            width: 100%; 
            height: 220px; 
            background-color: #000000; 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            position: relative; 
            display: none; 
            border: 2px solid #334155;
        }

        /* วงแหวนล็อกเป้าหน้าสไตล์สากล */
        #camera-container::after {
            content: '';
            position: absolute;
            top: 10%; left: 25%; right: 25%; bottom: 10%;
            border: 2px dashed var(--neon-cyan);
            border-radius: 24px;
            pointer-events: none;
            opacity: 0.4;
            animation: target-glow 2s infinite ease-in-out;
        }

        video, canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #captured-image { 
            display: none; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        /* ปุ่มกดดีไซน์ทรงพลังแบบไม่หนาเกินไป */
        .btn { 
            font-family: var(--font-heavy);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--neon-cyan);
            color: #020617; 
            border: none; 
            padding: 14px 20px; 
            width: 100%; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }

        .btn:hover { filter: brightness(1.2); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #1e293b !important; color: #475569 !important; cursor: not-allowed; }

        .btn-orange { background: var(--neon-orange); color: white; }
        .btn-secondary { background: #1e293b; color: #ffffff; border: 1px solid #475569; }

        .btn-submit-dynamic {
            background: var(--neon-green);
            color: #020617;
            margin-top: 10px;
            display: none;
        }

        /* 📬 กล่องสถานะดันขึ้นมาให้เด่นชัด อ่านง่าย ไม่ถูกบัง */
        #status { 
            margin-top: 12px; 
            font-size: 13px; 
            font-weight: bold; 
            padding: 12px; 
            border-radius: 10px; 
            display: none; 
            text-align: center;
        }

        .success { background: rgba(57, 255, 20, 0.15); color: var(--neon-green); display: block !important; border: 1px solid var(--neon-green); }
        .error { background: rgba(255, 0, 85, 0.15); color: var(--neon-red); display: block !important; border: 1px solid var(--neon-red); }
        .loading { background: rgba(0, 240, 255, 0.15); color: var(--neon-cyan); display: block !important; border: 1px solid var(--neon-cyan); }

        /* 🔑 ปรับแก้กล่องข้อมูลผู้ใช้: ป้องกันชื่อยาวทะลุขอบ บังคับให้ตัดคำขึ้นบรรทัดใหม่สวยๆ */
        .welcome-back { 
            background: rgba(2, 6, 23, 0.9);
            color: #ffffff; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            font-size: 13px; 
            border-left: 4px solid var(--neon-cyan);
            border-right: 4px solid var(--neon-cyan);
            font-family: var(--font-heavy);
            word-break: break-word; /* สั่งตัดคำอัจฉริยะถ้าชื่อยาวเกินไป */
            line-height: 1.4;
        }

        /* ปุ่มถอนสิทธิ์อุปกรณ์แบบเรียบหรูกลืนกับพื้นหลัง */
        #clear-btn { 
            margin-top: 15px; 
            font-size: 11px; 
            padding: 4px; 
            background: none; 
            color: #475569; 
            border: none;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            font-weight: 700;
        }
        #clear-btn:hover { color: var(--neon-red); }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        @keyframes target-glow {
            0%, 100% { border-color: var(--neon-cyan); }
            50% { border-color: var(--neon-green); }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="live-clock" id="clock-display">00:00:00</div>
    <h2>บันทึกเวลาปฏิบัติราชการ</h2>
    <p class="subtitle">โรงเรียนบ้านหนองประดู่</p>
    
    <div id="radar-panel" class="radar-panel">
        <div id="radar-light" class="radar-signal"></div>
        <span id="radar-text">CONNECTING SATELLITE...</span>
    </div>

    <div id="register-area" style="display: none;">
        <div class="form-group">
            <label for="empNameInput">SECURITY ALERT: UNKNOWN DEVICE</label>
            <input type="text" id="empNameInput" placeholder="กรอก ชื่อ - นามสกุล">
        </div>
        <button type="button" class="btn btn-orange" onclick="registerDevice()">📲 AUTHORIZE DEVICE</button>
    </div>

    <div id="main-area" style="display: none;">
        <div id="welcome-msg" class="welcome-back"></div>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <img id="captured-image" alt="Captured">
        </div>

        <button type="button" class="btn" id="capture-btn" onclick="capturePhoto()">📸 BIOMETRIC SCAN (ถ่ายรูป)</button>
        <button type="button" class="btn btn-secondary" id="retake-btn" onclick="retakePhoto()" style="display:none;">🔄 RESET SCANNER (ถ่ายใหม่)</button>
        
        <button type="button" class="btn btn-submit-dynamic" id="submit-btn" onclick="submitAttendance()">📥 ส่งเวลาเข้างาน</button>
        
        <button type="button" id="clear-btn" onclick="clearDevice()">⚠️ DE-AUTHORIZE DEVICE</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxyCwvvkH_7oTL08MCuihUOgOdziS93WPLtBXLC59D_x8sCM3TT5DZEq96QmWiyNKg8/exec"; 

    let base64Photo = "";
    let userLocation = { lat: null, lng: null };
    let activeStream = null;
    let savedName = "";
    
    const video = document.getElementById('video');
    const capturedImage = document.getElementById('captured-image');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const submitBtn = document.getElementById('submit-btn');
    const statusDiv = document.getElementById('status');
    const radarLight = document.getElementById('radar-light');
    const radarText = document.getElementById('radar-text');

    function runLiveClockAndCheckShift() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
            
            const currentHour = now.getHours();
            if (currentHour >= 13) {
                submitBtn.innerHTML = "📤 ส่งเวลาออกงาน (CHECK-OUT)";
                submitBtn.style.background = "var(--neon-orange)";
                submitBtn.style.color = "#ffffff";
            } else {
                submitBtn.innerHTML = "📥 ส่งเวลาเข้างาน (CHECK-IN)";
                submitBtn.style.background = "var(--neon-green)";
                submitBtn.style.color = "#020617";
            }
        }, 1000);
    }

    window.onload = function() {
        runLiveClockAndCheckShift();
        checkDeviceLock();
    };

    function checkDeviceLock() {
        savedName = localStorage.getItem('employee_name');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLocation.lat = position.coords.latitude;
                userLocation.lng = position.coords.longitude;
                
                radarText.innerText = "GPS SIGNAL: SECURED";
                radarLight.style.backgroundColor = "var(--neon-green)";

                if (!savedName) {
                    document.getElementById('register-area').style.display = 'block';
                    document.getElementById('main-area').style.display = 'none';
                } else {
                    document.getElementById('register-area').style.display = 'none';
                    document.getElementById('main-area').style.display = 'block';
                    document.getElementById('welcome-msg').innerHTML = "🔑 ACCESS GRANTED:<br>" + savedName;
                    document.getElementById('camera-container').style.display = 'block';
                    initCamera();
                }
            }, function(error) {
                radarText.innerText = "GPS ERROR: SIGNAL LOST!";
                radarLight.style.backgroundColor = "var(--neon-red)";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    }

    function registerDevice() {
        const nameInput = document.getElementById('empNameInput').value.trim();
        if (!nameInput) return alert("กรุณากรอกชื่อและนามสกุลด้วยครับ");
        
        localStorage.setItem('employee_name', nameInput);
        savedName = nameInput;
        
        document.getElementById('register-area').style.display = 'none';
        document.getElementById('main-area').style.display = 'block';
        document.getElementById('welcome-msg').innerHTML = "🔑 ACCESS GRANTED:<br>" + savedName;
        document.getElementById('camera-container').style.display = 'block';
        initCamera();
    }

    function initCamera() {
        const constraints = { video: { facingMode: "user" }, audio: false };
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            activeStream = stream;
            video.srcObject = stream;
        })
        .catch(function(err) {
            showStatus("🚨 HARDWARE ERROR: กล้องหน้าขัดข้อง", "error");
        });
    }

    function capturePhoto() {
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        base64Photo = canvas.toDataURL('image/jpeg', 0.6);
        capturedImage.src = base64Photo;
        
        video.style.display = 'none';
        capturedImage.style.display = 'block';
        captureBtn.style.display = 'none';
        retakeBtn.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    function retakePhoto() {
        video.style.display = 'block';
        capturedImage.style.display = 'none';
        captureBtn.style.display = 'block';
        retakeBtn.style.display = 'none';
        submitBtn.style.display = 'none';
        base64Photo = "";
    }

    function submitAttendance() {
        if (!savedName) return showStatus("❌ SECURITY ERROR: ไม่พบสิทธิ์ผู้ใช้", "error");
        if (!base64Photo) return showStatus("❌ BIOMETRIC ERROR: กรุณาถ่ายรูปก่อน", "error");

        showStatus("⚡ UPLOADING TO CLOUD...", "loading");
        submitBtn.disabled = true;

        let payload = {
            action: "submit_attendance",
            name: savedName,
            lat: userLocation.lat,
            lng: userLocation.lng,
            photo: base64Photo.split(',')[1]
        };

        fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(response => {
            submitBtn.disabled = false;
            if(response.status === "success") {
                showStatus(response.message, "success");
                setTimeout(retakePhoto, 2500);
            } else {
                showStatus(response.message, "error");
            }
        })
        .catch(err => {
            submitBtn.disabled = false;
            showStatus("NETWORK REFUSED: " + err, "error");
        });
    }

    function clearDevice() {
        if(confirm("คุณต้องการถอนสิทธิ์ยืนยันตัวตน (De-authorize) จากเครื่องนี้ใช่หรือไม่?")) {
            localStorage.removeItem('employee_name');
            location.reload();
        }
    }

    function showStatus(text, type) {
        statusDiv.innerHTML = text;
        statusDiv.className = type;
    }
</script>
</body>
</html>
