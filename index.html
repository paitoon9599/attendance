<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS ATTENDANCE SYSTEM (MINIMAL CLEAN)</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f1f5f9;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --color-blue: #2563eb;
            --color-orange: #ea580c;
            --color-green: #16a34a;
            --color-red: #dc2626;
            --border-light: #e2e8f0;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background-color: var(--bg-main);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px;
            color: var(--text-dark);
            overflow: hidden;
        }

        /* กล่องหลักแบบคลีน มินิมอล ควบคุมความสูงไม่ให้ล้นจอ */
        .app-card { 
            background: var(--card-bg);
            padding: 24px 20px 20px 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%; 
            max-width: 380px; 
            text-align: center;
            border: 1px solid var(--border-light);
        }

        /* นาฬิกาดิจิทัลแบบเรียบหรู ตัวหนาเด่นชัด */
        .live-clock {
            font-size: 36px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        h2 { 
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        p.subtitle { 
            color: var(--text-muted); 
            font-size: 12px; 
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* 📡 จุดสัญญาณพิกัด GPS แบบมินิมอลสบายตา */
        .radar-panel {
            background: #f8fafc;
            border: 1px solid var(--border-light);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .radar-signal {
            width: 8px;
            height: 8px;
            background-color: var(--color-orange);
            border-radius: 50%;
            position: relative;
        }
        .radar-signal::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background-color: inherit;
            border-radius: 50%;
            animation: pulse-ring 1.5s infinite ease-out;
        }

        .form-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }

        label { 
            display: block; 
            margin-bottom: 6px; 
            color: var(--text-dark); 
            font-size: 12px; 
            font-weight: 600;
        }

        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-light); 
            border-radius: 10px; 
            font-size: 15px; 
            outline: none;
            background: #f8fafc;
            color: var(--text-dark);
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }
        
        input[type="text"]:focus {
            border-color: var(--color-blue);
            background: #ffffff;
        }

        /* เฟรมกล้องมินิมอลขอบมน */
        #camera-container { 
            width: 100%; 
            height: 210px; 
            background-color: #f1f5f9; 
            border-radius: 14px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            position: relative; 
            display: none; 
            border: 1px solid var(--border-light);
        }

        video, canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        #captured-image { 
            display: none; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }

        /* ปุ่มกดสไตล์มินิมอล เรียบ ลื่นตา */
        .btn { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: var(--color-blue);
            color: white; 
            border: none; 
            padding: 14px 20px; 
            width: 100%; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out; 
            margin-bottom: 8px; 
        }

        .btn:hover { filter: brightness(1.05); }
        .btn:active { transform: scale(0.99); }
        .btn:disabled { background: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed; }

        .btn-orange { background: var(--color-orange); }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid var(--border-light); }

        /* ปุ่มส่งเวลาระบบสลับสีอัตโนมัติ */
        .btn-submit-dynamic {
            background: var(--color-green);
            margin-top: 8px;
            display: none;
        }

        /* กล่องแจ้งสถานะแบบคลีน สะอาด อ่านง่าย ไม่โดนบัง */
        #status { 
            margin-top: 10px; 
            font-size: 13px; 
            font-weight: 600; 
            padding: 10px 12px; 
            border-radius: 10px; 
            display: none; 
            text-align: center;
            line-height: 1.4;
        }

        .success { background: #f0fdf4; color: var(--color-green); display: block !important; border: 1px solid #bbf7d0; }
        .error { background: #fef2f2; color: var(--color-red); display: block !important; border: 1px solid #fecaca; }
        .loading { background: #eff6ff; color: var(--color-blue); display: block !important; border: 1px solid #bfdbfe; }

        /* 🔑 กล่องยืนยันชื่อ: ปรับปรุงโครงสร้างแก้คำล้น สั่งขึ้นบรรทัดใหม่สวยๆ */
        .welcome-back { 
            background: #f8fafc;
            color: var(--text-dark); 
            padding: 10px 12px; 
            border-radius: 10px; 
            font-weight: 600; 
            margin-bottom: 15px; 
            font-size: 13px; 
            border-left: 4px solid var(--color-blue);
            text-align: left;
            word-break: break-word; /* ตัดคำอัจฉริยะกรณีชื่อยาวมาก */
            line-height: 1.4;
        }
        .welcome-title {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 2px;
        }

        /* ปุ่มถอนสิทธิ์อุปกรณ์แบบสุภาพ ไม่สะดุดตา */
        #clear-btn { 
            margin-top: 12px; 
            font-size: 11px; 
            padding: 4px; 
            background: none; 
            color: #94a3b8; 
            border: none;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 500;
        }
        #clear-btn:hover { color: var(--color-red); }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="live-clock" id="clock-display">00:00:00</div>
    <h2>บันทึกเวลาปฏิบัติราชการ</h2>
    <p class="subtitle">โรงเรียนบ้านหนองประดู่ สพป.ลพบุรี เขต 2</p>
    
    <div id="radar-panel" class="radar-panel">
        <div id="radar-light" class="radar-signal"></div>
        <span id="radar-text">กำลังตรวจสอบพิกัด GPS...</span>
    </div>

    <div id="register-area" style="display: none;">
        <div class="form-group">
            <label for="empNameInput">ตรวจพบอุปกรณ์ใหม่: กรุณาระบุชื่อผู้ใช้งาน</label>
            <input type="text" id="empNameInput" placeholder="พิมพ์ ชื่อ - นามสกุล ของคุณ">
        </div>
        <button type="button" class="btn btn-orange" onclick="registerDevice()">📲 ลงทะเบียนผูกชื่อเข้ากับเครื่องนี้</button>
    </div>

    <div id="main-area" style="display: none;">
        <div id="welcome-msg" class="welcome-back">
            <div class="welcome-title">👤 บุคลากรผู้ผูกสิทธิ์เครื่อง</div>
            <div id="user-display-name">-</div>
        </div>
        
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <img id="captured-image" alt="Captured">
        </div>

        <button type="button" class="btn" id="capture-btn" onclick="capturePhoto()">📸 ถ่ายรูปใบหน้า</button>
        <button type="button" class="btn btn-secondary" id="retake-btn" onclick="retakePhoto()" style="display:none;">🔄 ถ่ายใหม่</button>
        
        <button type="button" class="btn btn-submit-dynamic" id="submit-btn" onclick="submitAttendance()">📥 บันทึกเวลาเข้างาน</button>
        
        <button type="button" id="clear-btn" onclick="clearDevice()">ถอนสิทธิ์การผูกเครื่องนี้</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxyCwvvkH_7oTL08MCuihUOgOdziS93WPLtBXLC59D_x8sCM3TT5DZEq96QmWiyNKg8/exec"; 

    let base64Photo = "";
    let userLocation = { lat: null, lng: null };
    let activeStream = null;
    let savedName = "";
    
    const video = document.getElementById('video');
    const capturedImage = document.getElementById('captured-image');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const submitBtn = document.getElementById('submit-btn');
    const statusDiv = document.getElementById('status');
    const radarLight = document.getElementById('radar-light');
    const radarText = document.getElementById('radar-text');

    // 🕒 ฟังก์ชันนาฬิกาเรียลไทม์ + ควบคุมชื่อปุ่มเข้า/ออกอัตโนมัติ (13.00 น.)
    function runLiveClockAndCheckShift() {
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-display').innerText = now.toLocaleTimeString('th-TH', { hour12: false });
            
            const currentHour = now.getHours();
            if (currentHour >= 13) {
                submitBtn.innerHTML = "📤 บันทึกเวลาออกงาน (CHECK-OUT)";
                submitBtn.style.background = "var(--color-orange)";
            } else {
                submitBtn.innerHTML = "📥 บันทึกเวลาเข้างาน (CHECK-IN)";
                submitBtn.style.background = "var(--color-green)";
            }
        }, 1000);
    }

    window.onload = function() {
        runLiveClockAndCheckShift();
        checkDeviceLock();
    };

    function checkDeviceLock() {
        savedName = localStorage.getItem('employee_name');
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                userLocation.lat = position.coords.latitude;
                userLocation.lng = position.coords.longitude;
                
                radarText.innerText = "เชื่อมต่อพิกัด GPS เรียบร้อย";
                radarLight.style.backgroundColor = "var(--color-green)";

                if (!savedName) {
                    document.getElementById('register-area').style.display = 'block';
                    document.getElementById('main-area').style.display = 'none';
                } else {
                    document.getElementById('register-area').style.display = 'none';
                    document.getElementById('main-area').style.display = 'block';
                    document.getElementById('user-display-name').innerText = savedName;
                    document.getElementById('camera-container').style.display = 'block';
                    initCamera();
                }
            }, function(error) {
                radarText.innerText = "ไม่สามารถระบุพิกัดได้! โปรดเปิด GPS";
                radarLight.style.backgroundColor = "var(--color-red)";
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    }

    function registerDevice() {
        const nameInput = document.getElementById('empNameInput').value.trim();
        if (!nameInput) return alert("กรุณากรอกชื่อและนามสกุลของคุณก่อนครับ");
        
        localStorage.setItem('employee_name', nameInput);
        savedName = nameInput;
        
        document.getElementById('register-area').style.display = 'none';
        document.getElementById('main-area').style.display = 'block';
        document.getElementById('user-display-name').innerText = savedName;
        document.getElementById('camera-container').style.display = 'block';
        initCamera();
    }

    function initCamera() {
        const constraints = { video: { facingMode: "user" }, audio: false };
        navigator.mediaDevices.getUserMedia(constraints)
        .then(function(stream) {
            activeStream = stream;
            video.srcObject = stream;
        })
        .catch(function(err) {
            showStatus("⚠️ สิทธิ์การเปิดกล้องถูกปฏิเสธ โปรดอนุญาตสิทธิ์ในเบราว์เซอร์", "error");
        });
    }

    function capturePhoto() {
        let canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        base64Photo = canvas.toDataURL('image/jpeg', 0.6);
        capturedImage.src = base64Photo;
        
        video.style.display = 'none';
        capturedImage.style.display = 'block';
        captureBtn.style.display = 'none';
        retakeBtn.style.display = 'block';
        submitBtn.style.display = 'block';
    }

    function retakePhoto() {
        video.style.display = 'block';
        capturedImage.style.display = 'none';
        captureBtn.style.display = 'block';
        retakeBtn.style.display = 'none';
        submitBtn.style.display = 'none';
        base64Photo = "";
    }

    function submitAttendance() {
        if (!savedName) return showStatus("❌ ไม่พบข้อมูลรายชื่อผู้ผูกเครื่อง", "error");
        if (!base64Photo) return showStatus("❌ กรุณาถ่ายรูปใบหน้าก่อนส่งข้อมูล", "error");

        showStatus("⏳ กำลังนำส่งข้อมูลเวลาบันทึก...", "loading");
        submitBtn.disabled = true;

        let payload = {
            action: "submit_attendance",
            name: savedName,
            lat: userLocation.lat,
            lng: userLocation.lng,
            photo: base64Photo.split(',')[1]
        };

        fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(response => {
            submitBtn.disabled = false;
            if(response.status === "success") {
                showStatus(response.message, "success");
                setTimeout(retakePhoto, 2500);
            } else {
                showStatus(response.message, "error");
            }
        })
        .catch(err => {
            submitBtn.disabled = false;
            showStatus("การเชื่อมต่อล้มเหลว: " + err, "error");
        });
    }

    function clearDevice() {
        if(confirm("คุณต้องการยกเลิกการผูกชื่อกับอุปกรณ์เครื่องนี้ใช่หรือไม่?")) {
            localStorage.removeItem('employee_name');
            location.reload();
        }
    }

    function showStatus(text, type) {
        statusDiv.innerHTML = text;
        statusDiv.className = type;
    }
</script>
</body>
</html>
